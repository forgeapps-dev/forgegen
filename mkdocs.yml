site_name: forgegen
site_description: Audio and video to funscript — generation engine for haptic content
site_author: Xolvco
docs_dir: docs
theme:
  name: material
  palette:
    scheme: slate
    primary: deep orange
    accent: orange
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Installation: installation.md
  - Quick Start: quick-start.md
  - Using the UI:
    - Overview: ui/index.md
    - Generate Tab: ui/generate.md
    - Details Tab: ui/details.md
  - Reference:
    - Styles: reference/styles.md
    - Phrase Modes: reference/modes.md
    - Supported Formats: reference/formats.md
  - CLI & Automation:
    - CLI Reference: cli/index.md
    - Pipeline Integration: cli/automation.md
  - Workflow:
    - forgegen + FunScriptForge: workflow/fsf-handoff.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
